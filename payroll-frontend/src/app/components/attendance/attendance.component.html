<div class="container-fluid">

  <!-- Header -->
  <div class="header">
    <h4>Attendance</h4>

    <button class="btn btn-primary" (click)="openModal()">
      + Mark Attendance
    </button>
  </div>

  <!-- Filter -->
  <div class="filter-box mb-3">
    <input [(ngModel)]="searchEmployeeId" class="form-control" placeholder="Enter Employee ID">
    <button class="btn btn-secondary" (click)="getAttendance()">Search</button>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let att of attendanceList">
          <td>{{att.employeeId}}</td>
          <td>{{att.date}}</td>
          <td>
            <span [ngClass]="{
              'badge bg-success': att.status === 'Present',
              'badge bg-danger': att.status === 'Absent'
            }">
              {{att.status}}
            </span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="attendanceModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Mark Attendance</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input [(ngModel)]="attendance.employeeId" class="form-control mb-3" placeholder="Employee ID">

        <input type="date" [(ngModel)]="attendance.date" class="form-control mb-3">

        <select [(ngModel)]="attendance.status" class="form-control mb-3">
          <option value="">Select Status</option>
          <option>Present</option>
          <option>Absent</option>
        </select>

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" (click)="save()">Submit</button>
      </div>

    </div>
  </div>
</div>
