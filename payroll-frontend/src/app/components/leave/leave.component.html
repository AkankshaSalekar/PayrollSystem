<div class="container-fluid">

  <!-- ================= HEADER ================= -->
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="fw-bold">Leave Management</h4>

    <button class="btn btn-primary" (click)="openModal()">
      + Apply Leave
    </button>
  </div>

  <!-- ================= TABLE ================= -->
  <div class="card shadow-sm p-3">

    <table class="table table-hover">
      <thead class="table-light">
        <tr>
          <th>Employee</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th *ngIf="role === 'admin'">Action</th>
        </tr>
      </thead>

      <tbody>

        <!-- No Data -->
        <tr *ngIf="leaveList.length === 0">
          <td colspan="5" class="text-center text-muted">
            No leave records found
          </td>
        </tr>

        <!-- Data -->
        <tr *ngFor="let leave of leaveList">
          <td>
            {{ leave.employeeId }} -
            {{ getEmployeeName(leave.employeeId) }}
          </td>

          <td>{{ leave.fromDate }}</td>
          <td>{{ leave.toDate }}</td>

          <!-- Status -->
          <td>
            <span [ngClass]="{
              'badge bg-warning text-dark': leave.status === 'Pending',
              'badge bg-success': leave.status === 'Approved',
              'badge bg-danger': leave.status === 'Rejected'
            }">
              {{ leave.status }}
            </span>
          </td>

          <!-- Admin Actions -->
          <td *ngIf="role === 'admin'">

            <button class="btn btn-success btn-sm me-2"
                    (click)="updateStatus(leave.id, 'Approved')"
                    [disabled]="leave.status === 'Approved'">
              Approve
            </button>

            <button class="btn btn-danger btn-sm"
                    (click)="updateStatus(leave.id, 'Rejected')"
                    [disabled]="leave.status === 'Rejected'">
              Reject
            </button>

          </td>

        </tr>
      </tbody>
    </table>

  </div>

</div>

<!-- ================= MODAL ================= -->
<div class="modal fade" id="leaveModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title">Apply Leave</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <!-- Body -->
      <div class="modal-body">

        <!-- Employee Dropdown -->
        <label class="form-label">Employee</label>
        <select [(ngModel)]="leave.employeeId"
                class="form-control mb-3">
          <option value="">Select Employee</option>

          <option *ngFor="let emp of employees" [value]="emp.id">
            {{ emp.name }} (ID: {{ emp.id }})
          </option>
        </select>

        <!-- From Date -->
        <label class="form-label">From Date</label>
        <input type="date"
               [(ngModel)]="leave.fromDate"
               class="form-control mb-3">

        <!-- To Date -->
        <label class="form-label">To Date</label>
        <input type="date"
               [(ngModel)]="leave.toDate"
               class="form-control mb-3">

      </div>

      <!-- Footer -->
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">
          Cancel
        </button>

        <button class="btn btn-primary" (click)="apply()">
          Submit
        </button>
      </div>

    </div>
  </div>
</div>
