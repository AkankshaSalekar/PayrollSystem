<div class="container-fluid">

  <!-- Header -->
  <div class="header">
    <h4>Payroll</h4>
  </div>

  <!-- Search Section -->
  <div class="card-box">
    <div class="row">
      <div class="col-md-4">
        <input [(ngModel)]="employeeId"
               class="form-control"
               placeholder="Enter Employee ID">
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100"
                (click)="getPayroll()">
          Get Payroll
        </button>
      </div>
    </div>
  </div>

  <!-- Result Card -->
  <div *ngIf="payroll" class="result-card">

    <div class="row text-center">

      <div class="col-md-4">
        <div class="stat-box">
          <h6>Base Salary</h6>
          <h4>₹{{payroll.baseSalary}}</h4>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-box">
          <h6>Present Days</h6>
          <h4>{{payroll.presentDays}}</h4>
        </div>
      </div>

      <div class="col-md-4">
        <div class="stat-box total">
          <h6>Total Salary</h6>
          <h3>₹{{payroll.calculatedSalary}}</h3>
        </div>
      </div>

    </div>

  </div>

  <!-- Table History -->
  <div *ngIf="payrollHistory.length > 0" class="table-card mt-4">
    <h5>Payroll History</h5>

    <table class="table table-hover">
      <thead>
        <tr>
          <th>Employee ID</th>
          <th>Base Salary</th>
          <th>Present Days</th>
          <th>Total Salary</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of payrollHistory">
          <td>{{p.employeeId}}</td>
          <td>{{p.baseSalary}}</td>
          <td>{{p.presentDays}}</td>
          <td>{{p.calculatedSalary}}</td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
