<div class="container-fluid">

  <div class="header flex-column flex-md-row">
    <h4 class="mb-2 mb-md-0">Employees</h4>
 <button class="btn btn-primary w-100" (click)="openModal()">
  + Create Employee
</button>

  </div>

  <div class="table-card">
    <div class="table-responsive">
      <table class="table table-hover">

        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Salary Type</th>
            <th>Amount</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let emp of employees">
            <td>{{ emp.name }}</td>
            <td>{{ emp.role }}</td>
            <td>{{ emp.salaryType }}</td>
            <td>₹{{ emp.salaryAmount }}</td>

            <td class="text-center">
              <div class="dropdown">
                <button class="action-btn" data-bs-toggle="dropdown">⋮</button>

                <ul class="dropdown-menu dropdown-menu-end">
                  <li>
                    <button class="dropdown-item" (click)="view(emp)">View</button>
                  </li>
                  <li>
                    <button class="dropdown-item" (click)="edit(emp)">Update</button>
                  </li>
                  <li>
                    <button class="dropdown-item text-danger" (click)="delete(emp.id)">
                      Delete
                    </button>
                  </li>
                </ul>
              </div>
            </td>

          </tr>
        </tbody>

      </table>
    </div>
  </div>

</div>

<div class="modal fade" id="employeeModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm modal-md">
    <div class="modal-content">

      <div class="modal-header">
        <h5>{{ isEdit ? 'Update Employee' : 'Create Employee' }}</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input [(ngModel)]="employee.name" class="form-control mb-3" placeholder="Name">

        <select [(ngModel)]="employee.role" class="form-control mb-3">
          <option value="">Select Role</option>
          <option>WFH</option>
          <option>Office</option>
          <option>On-site</option>
        </select>

        <select [(ngModel)]="employee.salaryType" class="form-control mb-3">
          <option value="">Salary Type</option>
          <option>Monthly</option>
          <option>Daily</option>
        </select>

        <input type="number" [(ngModel)]="employee.salaryAmount" class="form-control mb-3" placeholder="Salary">

      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary w-50" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success w-50" (click)="save()">
          {{ isEdit ? 'Update' : 'Save' }}
        </button>
      </div>

    </div>
  </div>
</div>
